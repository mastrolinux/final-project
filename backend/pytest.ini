[pytest]
# Pytest configuration for Identity Management API

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage settings
addopts = 
    --strict-markers
    --tb=short

# Note: Deprecation warnings from third-party libraries (supabase, passlib, jose)
# are expected and documented in KNOWN_WARNINGS.md. These do not affect functionality.

# Async test configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Output
console_output_style = progress
log_cli = false
log_cli_level = INFO

