# mypy configuration
#
# The project uses SQLAlchemy 2.0 with legacy 1.x-style Column() declarations
# rather than 2.0 Mapped[] annotations. This produces false positives for
# arg-type errors when Column[X] values flow into functions expecting plain X.
# At runtime, SQLAlchemy's descriptor protocol returns plain values, so these
# mismatches are not actual bugs.
#
# Per-module overrides suppress these artifacts while keeping strict checking
# for pure-Python modules (schemas, core utilities).

[mypy]
python_version = 3.12
ignore_missing_imports = True
warn_return_any = False
warn_unused_configs = True
check_untyped_defs = True

# SQLAlchemy model definitions: Column() types, mixin overrides, relationship
# descriptors all produce false positives with mypy.
[mypy-src.models.*]
ignore_errors = True

# Supabase optional-import pattern (try/except setting symbols to None)
# cannot be expressed in mypy's type system without protocol gymnastics.
[mypy-src.core.database]
ignore_errors = True

# Repository layer passes Column attribute values to typed constructors.
[mypy-src.repositories.*]
disable_error_code = arg-type, return-value, assignment, override

# Service layer receives Column values from repositories and passes them on.
# Also uses sentinel-type patterns (_Unset) that mypy cannot narrow.
[mypy-src.services.*]
disable_error_code = arg-type, return-value, union-attr, assignment, operator

# Endpoint layer constructs Pydantic schemas from ORM model attributes.
[mypy-src.api.v1.endpoints.*]
disable_error_code = arg-type, assignment, dict-item, misc, union-attr, operator, attr-defined

# Auth dependencies access ORM model attributes for authorization checks.
[mypy-src.api.dependencies.*]
disable_error_code = arg-type
