project:
  type: book
  output-dir: _book

book:
  title: "Identity and Profile Management API"
  subtitle: "A Context-Aware Approach to Digital Identity"
  author: "Luca Cipriani"
  date: today
  chapters:
    - index.qmd
    - literature-review.qmd
    - part: "System Architecture"
      chapters:
        # - architecture/original-problem.qmd
        - architecture/overview.qmd
        - architecture/system-context.qmd
        - architecture/component-architecture.qmd
        - architecture/context-resolution.qmd
        - architecture/data-architecture.qmd
        - architecture/security-architecture.qmd
        - architecture/integration-architecture.qmd
        - architecture/deployment-operations.qmd
        - architecture/decisions-future.qmd

bibliography:
  - references.bib
  - identity-management-background.bib
csl: quarto_files/ieee.csl

mermaid:
  theme: default

execute:
  freeze: auto

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 2
    number-sections: true
    code-fold: false
    code-tools: true
  pdf:
    documentclass: scrreprt
    toc: true
    toc-depth: 2
    number-sections: true
    colorlinks: true
    fig-width: 6
    fig-height: 4
    fig-pos: 'H'
    keep-tex: false
    geometry:
      - top=20mm
      - bottom=20mm
      - left=20mm
      - right=20mm
      - heightrounded
    classoption:
      - oneside
      - open=any
    include-in-header:
      text: |
        \usepackage{graphicx}
        \usepackage{calc}
        \usepackage{float}
        \let\Oldincludegraphics\includegraphics
        \renewcommand{\includegraphics}[2][]{%
          \Oldincludegraphics[width=\linewidth,height=0.8\textheight,keepaspectratio]{#2}%
        }
        \raggedbottom
        \setlength{\parskip}{0.5em}
        \RedeclareSectionCommand[beforeskip=1.5em,afterskip=0.5em]{section}
        \RedeclareSectionCommand[beforeskip=1em,afterskip=0.3em]{subsection}
        \RedeclareSectionCommand[beforeskip=0.8em,afterskip=0.2em]{subsubsection}

