# Continuous Integration
#
# Runs backend and frontend quality checks on every push and pull request.
# Callable as a reusable workflow from deploy.yml for CD gating.
#
# Backend checks: mypy (type checking), pytest (with coverage)
# Frontend checks: vue-tsc (type checking), eslint, vitest (with coverage)
#
# No external services required. Backend tests use SQLite in-memory
# and mocked Redis. Frontend tests use happy-dom.

name: CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
  workflow_call:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports

      - name: Run tests with coverage
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-secret-key-not-for-production-use"
          JWT_SECRET_KEY: "ci-jwt-secret-key-not-for-production"
          ENVIRONMENT: "test"
          REDIS_ENABLED: "false"
        run: |
          export PYTHONPATH=$PWD:$PYTHONPATH
          pytest --cov=src --cov-report=term-missing -q

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage
