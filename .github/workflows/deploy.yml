# Continuous Deployment to Render.com
#
# Triggers on push to main branch when backend code or render.yaml changes.
# Calls Render deploy hooks to trigger builds for the API and Celery worker.
# The Redis key-value instance runs continuously and has no deploy hook.
#
# Required GitHub repository secrets:
#   RENDER_DEPLOY_HOOK_API    - Deploy hook URL for identity-api web service
#   RENDER_DEPLOY_HOOK_WORKER - Deploy hook URL for identity-celery-worker
#
# CI (tests, linting) is handled by a separate workflow (see MAS-89).
# To add a CI gate, add a test job and use `needs: test` on the deploy job.

name: Deploy to Render

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "render.yaml"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest

    steps:
      - name: Deploy API Service
        run: curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_API }}"

      - name: Deploy Celery Worker
        run: curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_WORKER }}"
